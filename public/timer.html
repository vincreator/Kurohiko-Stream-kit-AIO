<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KSK Timer Widget</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:transparent;overflow:hidden;font-family:'Inter',sans-serif;}
#stage{position:fixed;top:0;left:0;width:1920px;height:1080px;transform-origin:top left;pointer-events:none;}
#timer-wrap{
  position:absolute;right:64px;top:54px;
  min-width:360px;max-width:560px;
  background:rgba(8,10,16,.86);
  border:1px solid rgba(255,255,255,.12);
  border-radius:18px;
  box-shadow:0 24px 80px rgba(0,0,0,.62);
  padding:18px 20px 16px;
}
#timer-label{
  font-size:.68rem;letter-spacing:2px;text-transform:uppercase;
  color:var(--accent,#38bdf8);font-weight:800;margin-bottom:10px;
}
#timer-value{
  font-family:'JetBrains Mono',monospace;
  font-size:3.1rem;font-weight:900;line-height:1;
  color:#f2f6ff;
  text-shadow:0 0 30px color-mix(in srgb,var(--accent,#38bdf8) 36%, transparent);
}
#timer-sub{
  margin-top:8px;font-size:.58rem;color:rgba(255,255,255,.42);letter-spacing:.8px;
}
#bar{
  margin-top:14px;height:8px;border-radius:999px;
  background:rgba(255,255,255,.08);overflow:hidden;
}
#bar-fill{
  height:100%;width:100%;
  background:linear-gradient(90deg,var(--accent,#38bdf8), color-mix(in srgb,var(--accent,#38bdf8) 50%, #ffffff 50%));
  transition:width .35s linear;
}
#timer-wrap.finished{
  animation:pulse .9s ease 2;
}
#timer-wrap.paused #timer-value{opacity:.72;}
@keyframes pulse{
  0%{transform:scale(1)}
  30%{transform:scale(1.025)}
  100%{transform:scale(1)}
}
</style>
</head>
<body>
<div id="stage">
  <div id="timer-wrap">
    <div id="timer-label">COUNTDOWN</div>
    <div id="timer-value">05:00</div>
    <div id="timer-sub">READY</div>
    <div id="bar"><div id="bar-fill"></div></div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
function scaleStage(){
  const stage = document.getElementById('stage');
  const sx = window.innerWidth / 1920;
  const sy = window.innerHeight / 1080;
  const sc = Math.min(sx, sy);
  stage.style.transform = 'scale('+sc+')';
  stage.style.left = ((window.innerWidth - 1920*sc)/2) + 'px';
  stage.style.top = ((window.innerHeight - 1080*sc)/2) + 'px';
}
scaleStage();
window.addEventListener('resize', scaleStage);

const socket = io();
const wrap = document.getElementById('timer-wrap');
const labelEl = document.getElementById('timer-label');
const valueEl = document.getElementById('timer-value');
const subEl = document.getElementById('timer-sub');
const barFill = document.getElementById('bar-fill');

let totalMs = 300000;
let running = false;

function fmt(ms){
  const t = Math.max(0, Math.ceil(ms / 1000));
  const h = Math.floor(t / 3600);
  const m = Math.floor((t % 3600) / 60);
  const s = t % 60;
  if (h > 0) return String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}

function render(state){
  if (!state) return;
  totalMs = Number(state.totalMs) || totalMs;
  const rem = Math.max(0, Number(state.remainingMs) || 0);
  running = !!state.running;

  labelEl.textContent = state.label || 'COUNTDOWN';
  valueEl.textContent = fmt(rem);
  subEl.textContent = running ? 'RUNNING' : (rem <= 0 ? 'FINISHED' : 'PAUSED');
  wrap.classList.toggle('paused', !running && rem > 0);

  if (state.color) {
    document.documentElement.style.setProperty('--accent', state.color);
  }

  const pct = totalMs > 0 ? Math.max(0, Math.min(1, rem / totalMs)) : 0;
  barFill.style.width = (pct * 100).toFixed(2) + '%';
}

socket.on('timer-sync', (s) => render(s));
socket.on('timer-finished', () => {
  wrap.classList.remove('finished');
  void wrap.offsetWidth;
  wrap.classList.add('finished');
});

(async () => {
  try {
    const [cfgRes, stateRes] = await Promise.all([
      fetch('/api/timer/config'),
      fetch('/api/timer/state')
    ]);
    const cfg = await cfgRes.json();
    const state = await stateRes.json();
    render({ ...state, label: cfg.label || state.label, color: cfg.color || state.color });
  } catch {}
})();
</script>
</body>
</html>
