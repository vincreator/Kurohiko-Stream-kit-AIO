<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OBS Overlay</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:transparent;overflow:hidden;}
/* #stage selalu 1920×1080 di-scale ke viewport — semua posisi px di dalamnya akurat */
#stage{
  position:fixed;
  top:0;left:0;
  width:1920px;
  height:1080px;
  transform-origin:top left;
  /* scale di-set lewat JS saat load & resize */
  pointer-events:none;
}
#mw{position:absolute;display:none;pointer-events:none;}
#mw img{display:block;width:100%;height:100%;object-fit:fill;}
#mw video{display:none;width:100%;height:100%;object-fit:fill;}
#mw canvas{display:none;width:100%;height:100%;}
@keyframes fadeIn    {from{opacity:0}to{opacity:1}}
@keyframes fadeOut   {from{opacity:1}to{opacity:0}}
@keyframes popIn     {from{opacity:0;transform:scale(0.3)}to{opacity:1;transform:scale(1)}}
@keyframes popOut    {from{opacity:1;transform:scale(1)}to{opacity:0;transform:scale(0.3)}}
@keyframes slideUpIn {from{opacity:0;transform:translateY(80px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUpOut{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-80px)}}
@keyframes slideDnIn {from{opacity:0;transform:translateY(-80px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideDnOut{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(80px)}}
@keyframes slideLIn  {from{opacity:0;transform:translateX(-100px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideLOut {from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(-100px)}}
@keyframes slideRIn  {from{opacity:0;transform:translateX(100px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideROut {from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(100px)}}
@keyframes bounceIn  {0%{opacity:0;transform:scale(0.2)}60%{transform:scale(1.15)}80%{transform:scale(0.95)}100%{opacity:1;transform:scale(1)}}
@keyframes zoomRotIn {from{opacity:0;transform:scale(0.2)rotate(-15deg)}to{opacity:1;transform:scale(1)rotate(0)}}
@keyframes zoomRotOut{from{opacity:1;transform:scale(1)rotate(0)}to{opacity:0;transform:scale(0.2)rotate(15deg)}}
@keyframes flipIn    {from{opacity:0;transform:perspective(600px)rotateY(90deg)}to{opacity:1;transform:perspective(600px)rotateY(0)}}
@keyframes flipOut   {from{opacity:1;transform:perspective(600px)rotateY(0)}to{opacity:0;transform:perspective(600px)rotateY(-90deg)}}
</style>
</head>
<body>
<div id="stage">
  <div id="mw">
    <img id="mi" src="" alt="" style="display:none">
    <video id="mv" src="" style="display:none" playsinline></video>
    <canvas id="mc" style="display:none"></canvas>
  </div>
</div>
<audio id="ma"></audio>
<script src="/socket.io/socket.io.js"></script>
<script>
// Scale #stage (1920×1080) agar pas di viewport OBS
function scaleStage(){
  const stage = document.getElementById('stage');
  const scaleX = window.innerWidth  / 1920;
  const scaleY = window.innerHeight / 1080;
  const scale  = Math.min(scaleX, scaleY);
  stage.style.transform = 'scale('+scale+')';
  // Center jika aspect ratio berbeda
  const ox = (window.innerWidth  - 1920*scale) / 2;
  const oy = (window.innerHeight - 1080*scale) / 2;
  stage.style.left = ox+'px';
  stage.style.top  = oy+'px';
}
scaleStage();
window.addEventListener('resize', scaleStage);

const socket=io();
const mw=document.getElementById('mw');
const mi=document.getElementById('mi');
const mv=document.getElementById('mv');
const mc=document.getElementById('mc');
const ctx=mc.getContext('2d',{willReadFrequently:true});
const ma=document.getElementById('ma');

const IN ={fade:'fadeIn',pop:'popIn','slide-up':'slideUpIn','slide-down':'slideDnIn','slide-left':'slideLIn','slide-right':'slideRIn',bounce:'bounceIn','zoom-rotate':'zoomRotIn',flip:'flipIn'};
const OUT={fade:'fadeOut',pop:'popOut','slide-up':'slideUpOut','slide-down':'slideDnOut','slide-left':'slideLOut','slide-right':'slideROut','zoom-rotate':'zoomRotOut',flip:'flipOut'};

let hideTimer=null, hiding=false, queueList=[], curData=null;
let chromaRAF=null; // requestAnimationFrame id for chroma loop

function enqueueMedia(data){
  queueList.push(data);
}
function dequeueMedia(){
  return queueList.shift();
}
function consumeNextQueue(){
  if(hiding) return;
  if(mw.style.display!=='none') return;
  if(!queueList.length) return;
  const next = dequeueMedia();
  if(next) doShow(next);
}

function getType(n){
  const e=n.split('.').pop().toLowerCase();
  if(['jpg','jpeg','png','gif','webp'].includes(e)) return 'image';
  if(['mp4','webm','mov'].includes(e)) return 'video';
  return 'audio';
}

// ─── CHROMA KEY ─────────────────────────────────────────
function colorDistance(r,g,b, tr,tg,tb){
  return Math.sqrt((r-tr)**2 + (g-tg)**2 + (b-tb)**2);
}

function chromaFrame(tr,tg,tb, sens, blend){
  if(mv.paused || mv.ended || hiding){ chromaRAF=null; return; }
  const w=mc.width, h=mc.height;
  ctx.drawImage(mv, 0, 0, w, h);
  const frame=ctx.getImageData(0, 0, w, h);
  const d=frame.data;
  const threshold = sens * 442; // 442 = max distance in RGB space (sqrt(255^2*3))
  const blendRange = blend * 442;

  for(let i=0; i<d.length; i+=4){
    const dist = colorDistance(d[i], d[i+1], d[i+2], tr, tg, tb);
    if(dist < threshold){
      d[i+3] = 0; // fully transparent
    } else if(dist < threshold + blendRange){
      // Edge blend — smooth transition
      d[i+3] = Math.round(255 * ((dist - threshold) / blendRange));
    }
  }
  ctx.putImageData(frame, 0, 0);
  chromaRAF = requestAnimationFrame(()=>chromaFrame(tr,tg,tb,sens,blend));
}

function startChroma(data, onReady){
  stopChroma();
  const color = data.chromaColor || '#00ff00';
  const sens = Number(data.chromaSens) || 0.35;
  const blend = Number(data.chromaBlend) || 0.1;
  const tr = parseInt(color.slice(1,3),16);
  const tg = parseInt(color.slice(3,5),16);
  const tb = parseInt(color.slice(5,7),16);

  const tryStart = () => {
    if(mv.videoWidth && mv.videoHeight){
      mc.width = mv.videoWidth;
      mc.height = mv.videoHeight;
      mc.style.display = 'block';
      mv.style.display = 'none';
      chromaFrame(tr,tg,tb,sens,blend);
      if(onReady) onReady(); // callback: animasi baru jalan setelah canvas siap
    } else {
      setTimeout(tryStart, 30);
    }
  };
  tryStart();
}

function stopChroma(){
  if(chromaRAF){ cancelAnimationFrame(chromaRAF); chromaRAF=null; }
  mc.style.display='none';
}

// ─── SHOW / HIDE ────────────────────────────────────────
function doShow(data){
  hiding=false;
  curData=data;
  const{filename,animIn='pop',animOut='fade',animInSpeed=400,animOutSpeed=350,
        duration=5,posX=0,posY=0,maxW=600,maxH=400,volume=80,companionAudio='',
        chromaKey=false,cropTop=0,cropBottom=0,cropLeft=0,cropRight=0}=data;

  const type=getType(filename);
  const url='/assets/'+encodeURIComponent(filename);
  const vol=Math.max(0,Math.min(1,volume/100));
  const dur=Number(duration)||0;
  const outAnim=OUT[animOut]||'fadeOut';

  // Position — px absolut di dalam #stage 1920×1080
  mw.style.left   = posX+'px';
  mw.style.top    = posY+'px';
  mw.style.width  = maxW+'px';
  mw.style.height = maxH+'px';

  // Apply crop via clip-path
  if(cropTop||cropBottom||cropLeft||cropRight){
    mw.style.clipPath = 'inset('+cropTop+'% '+cropRight+'% '+cropBottom+'% '+cropLeft+'%)';
  } else {
    mw.style.clipPath = 'none';
  }

  // Stop/clear
  clearTimeout(hideTimer);
  stopChroma();
  mi.style.display='none'; mv.style.display='none'; mc.style.display='none';
  mv.pause(); ma.pause();
  mi.src=''; mv.src=''; ma.src='';

  // Companion audio
  if(companionAudio){
    ma.src='/assets/'+encodeURIComponent(companionAudio);
    ma.volume=vol;
    ma.play().catch(()=>{});
  }

  if(type==='audio'){
    ma.src=url; ma.volume=vol;
    ma.play().catch(()=>{});
    mw.style.display='none';
    // Cleanup saat audio selesai natural
    ma.onended = () => {
      hiding=false;
      consumeNextQueue();
    };
    // Force-stop jika dur > 0
    if(dur > 0){
      hideTimer = setTimeout(()=>{
        ma.pause(); ma.src='';
        hiding=false;
        consumeNextQueue();
      }, dur*1000);
    }
    return;
  }

  if(type==='image'){
    mi.src=url; mi.style.display='block';
    playShow();
  } else {
    mv.src=url; mv.volume=vol;
    mv.play().catch(()=>{});
    if(chromaKey){
      mv.style.display='none';
      // Tunda animasi & tampilan sampai canvas siap
      mw.style.display='none';
      startChroma(data, ()=>{
        if(!hiding) playShow();
      });
    } else {
      mv.style.display='block';
      mc.style.display='none';
      playShow();
    }
    mv.onended=()=>{ if(!hiding) doHide(outAnim, animOutSpeed); };
    // Force-stop video sebelum selesai jika dur > 0
    if(dur > 0){
      hideTimer=setTimeout(()=>{ if(!hiding) doHide(outAnim, animOutSpeed); }, dur*1000);
    }
    return; // jangan lanjut ke playShow di bawah untuk video (sudah dipanggil di atas)
  }

  function playShow(){
    mw.style.display='block';
    mw.style.animation='';
    void mw.offsetWidth;
    mw.style.animation=`${IN[animIn]||'fadeIn'} ${animInSpeed}ms cubic-bezier(0.34,1.56,0.64,1) forwards`;
  }

  // Duration timer untuk image (video pakai onended + timer force-stop di atas)
  if(type==='image' && dur>0){
    hideTimer=setTimeout(()=>{
      if(!hiding) doHide(outAnim, animOutSpeed);
    }, dur*1000);
  }
}

function doHide(anim='fadeOut', speed=300){
  clearTimeout(hideTimer);
  if(mw.style.display==='none'){
    hiding=false;
    consumeNextQueue();
    return;
  }
  hiding=true;
  mv.pause();
  ma.pause();
  stopChroma();
  mw.style.animation=`${anim} ${speed}ms ease forwards`;
  setTimeout(()=>{
    mw.style.display='none';
    mw.style.animation='';
    mi.style.display='none'; mv.style.display='none'; mc.style.display='none';
    mi.src=''; mv.src=''; ma.src='';
    hiding=false;
    consumeNextQueue();
  }, speed);
}

socket.on('show-media', data=>{
  clearTimeout(hideTimer);
  const queue=data.queueMode===true;

  if(queue){
    // Queue mode: pertama langsung tampil jika idle, sisanya antre FIFO
    if(!hiding && mw.style.display==='none' && queueList.length===0){
      doShow(data);
      return;
    }
    enqueueMedia(data);
    // Kalau sedang tampil, paksa transisi out agar antrean mulai jalan
    if(!hiding && mw.style.display!=='none'){
      const ao=OUT[curData&&curData.animOut||'fade']||'fadeOut';
      const spd=curData&&curData.animOutSpeed||350;
      doHide(ao,spd);
    }
    return;
  }

  // Non-queue mode: clear antrean lalu tampilkan item terbaru
  queueList = [];
  if(hiding){
    enqueueMedia(data);
    return;
  }
  if(mw.style.display!=='none'){
    doShow(data);
  } else {
    doShow(data);
  }
});

socket.on('hide-media',()=>{ queueList=[]; doHide(); });
</script>
</body>
</html>
